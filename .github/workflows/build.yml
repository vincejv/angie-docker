name: Build and push to Docker Hub

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY_IMAGE: vincejv/angie
  NGINX_VERSION: 1.11.8
  NGINX_COMMIT: e87e478a056bcfe6da3dbc45117c1fdf81ac1b1b
  NGX_BROTLI_COMMIT: a71f9312c2deb28875acc7bacfdd5695a111aa53
  NJS_VERSION: 1.0.0
  QUICKJS_COMMIT: 3d5e064e9dd67c70f7962836505a7fa067bf0a4e
  HEADERS_MORE_VERSION: 0.39
  GEOIP2_VERSION: 3.4
  FANCYINDEX_COMMIT: 70311f239ec1e88ff79c669d126d08532ddb8554
  ZSTDNGINX_COMMIT: f4ba115e0b0eaecde545e5f37db6aa18917d8f4b
  VERSION_OPENSSL: openssl-4.0.0
  CURL_VERSION: 8.21.0
  SHA256_CURL: d9b327997999045a24cda50f3983e69e51c516bd8be6ef9842fc7f99135e33bb
  PCRE_VERSION: 10.47
  ZLIB_VERSION: 2.3.3

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            # set latest tag for default branch
            type=raw,value=${{ matrix.march }}-ubuntu
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retrieve commit
        id: commit
        uses: prompt/actions-commit-hash@v4
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          build-args: |
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            NGINX_COMMIT=${{ env.NGINX_COMMIT }}
            NGX_BROTLI_COMMIT=${{ env.NGX_BROTLI_COMMIT }}
            NJS_VERSION=${{ env.NJS_VERSION }}
            QUICKJS_COMMIT=${{ env.QUICKJS_COMMIT }}
            HEADERS_MORE_VERSION=${{ env.HEADERS_MORE_VERSION }}
            GEOIP2_VERSION=${{ env.GEOIP2_VERSION }}
            FANCYINDEX_COMMIT=${{ env.FANCYINDEX_COMMIT }}
            ZSTDNGINX_COMMIT=${{ env.ZSTDNGINX_COMMIT }}
            VERSION_OPENSSL=${{ env.VERSION_OPENSSL }}
            CURL_VERSION=${{ env.CURL_VERSION }}
            SHA256_CURL=${{ env.SHA256_CURL }}
            PCRE_VERSION=${{ env.PCRE_VERSION }}
            ZLIB_VERSION=${{ env.ZLIB_VERSION }}
            NGINX_REV=${{ steps.commit.outputs.short }}
          tags: | 
            ${{ env.REGISTRY_IMAGE }}:latest
            ${{ env.REGISTRY_IMAGE }}:${{ env.NGINX_VERSION }}-${{ steps.commit.outputs.short }}
            ghcr.io/${{ env.REGISTRY_IMAGE }}:latest
            ghcr.io/${{ env.REGISTRY_IMAGE }}:${{ env.NGINX_VERSION }}-${{ steps.commit.outputs.short }}